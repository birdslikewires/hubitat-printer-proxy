# /etc/snmp/snmpd.conf.d/printer-proxy.conf
#
# SNMP config for printer-proxy cached responses.

# Extend systemonly view to include printer MIB OIDs
view systemonly included .1.3.6.1.2.1.43

# Allow read access from LAN and localhost
rocommunity public 192.168.11.0/24
rocommunity public localhost

# Serve the printer MIB subtree from our cache script
pass_persist .1.3.6.1.2.1.43 /usr/bin/python3 /opt/hubitat-printer-proxy/snmp-responder.py
